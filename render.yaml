services:
  # --- Backend : API FastAPI (ML + PostgreSQL + Gemini) ---
  - type: web
    name: nouankanyai-backend
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Secrets réels à saisir dans le dashboard Render (jamais committés) :
      - key: GEMINI_API_KEY
        sync: false
      # Chaîne de connexion PostgreSQL (Render Postgres "nouankanyai-db")
      - key: DATABASE_URL
        sync: false
      # Secret de signature des JWT d'authentification (générer une valeur aléatoire longue)
      - key: JWT_SECRET
        sync: false
      # URL complète du frontend déployé (ex: https://nouankanyai-frontend.onrender.com),
      # à renseigner après le premier déploiement du service frontend (autorise le CORS).
      - key: FRONTEND_URL
        sync: false

  # --- Frontend : Next.js 15 ---
  - type: web
    name: nouankanyai-frontend
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # URL complète du backend déployé (ex: https://nouankanyai-backend.onrender.com),
      # à renseigner après le premier déploiement du service backend.
      - key: NEXT_PUBLIC_API_URL
        sync: false
